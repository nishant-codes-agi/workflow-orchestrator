services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: daguser
      POSTGRES_PASSWORD: dagpass
      POSTGRES_DB: dagdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U daguser -d dagdb']
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      DATABASE_URL: postgres://daguser:dagpass@postgres:5432/dagdb
      WORKER_COUNT: 10
      HEARTBEAT_INTERVAL_MS: 5000
      REAPER_POLL_MS: 30000
      LEASE_TIMEOUT_MS: 15000
      CRON_TICK_MS: 10000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
