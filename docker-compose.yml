services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: daguser
      POSTGRES_PASSWORD: dagpass
      POSTGRES_DB: dagdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U daguser -d dagdb']
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
